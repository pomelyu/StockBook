services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockbook
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockbook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://stockbook:password@db:5432/stockbook
    ports:
      - "8000:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
